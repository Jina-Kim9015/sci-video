<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>과학 동영상 포털</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>

  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #1c2129;
    --border: #30363d;
    --text: #e6edf3;
    --text-muted: #8b949e;
    --accent: #ff3c3c;
    --tag-math: #f78166;
    --tag-physics: #79c0ff;
    --tag-chem: #ffa657;
    --tag-bio: #7ce38b;
    --tag-earth: #56d364;
    --tag-info: #d2a8ff;
    --tag-etc: #e3b341;
    --series-travel: #ff6b35;
    --series-science: #4facfe;
    --series-kbs: #a855f7;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Noto Sans KR', sans-serif; min-height: 100vh; }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 18px 32px;
    position: sticky; top: 0; z-index: 100;
    display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
  }
  .logo { display: flex; align-items: center; gap: 10px; }
  .logo-icon { width: 34px; height: 34px; background: var(--accent); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
  .logo-text { font-weight: 700; font-size: 17px; color: var(--text); }
  .header-right { margin-left: auto; }
  .search-box {
    background: var(--surface2); border: 1px solid var(--border); border-radius: 8px;
    padding: 8px 14px; color: var(--text); font-size: 14px; font-family: inherit;
    width: 240px; outline: none; transition: border-color 0.2s;
  }
  .search-box:focus { border-color: var(--accent); }
  .search-box::placeholder { color: var(--text-muted); }

  .filter-bar {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 10px 32px; display: flex; gap: 8px; flex-wrap: wrap; align-items: center;
  }
  .filter-label { font-size: 12px; color: var(--text-muted); font-weight: 500; margin-right: 4px; }
  .filter-btn {
    border: 1px solid var(--border); border-radius: 20px; padding: 5px 14px;
    font-size: 13px; font-family: inherit; font-weight: 500; cursor: pointer;
    transition: all 0.2s; background: var(--surface2); color: var(--text-muted);
  }
  .filter-btn:hover { border-color: #484f58; color: var(--text); }
  .filter-btn.active { color: #fff; border-color: transparent; }
  .filter-btn[data-filter="all"].active { background: #444; }
  .filter-btn[data-filter="수학"].active { background: var(--tag-math); }
  .filter-btn[data-filter="물리"].active { background: var(--tag-physics); color: #000; }
  .filter-btn[data-filter="화학"].active { background: var(--tag-chem); color: #000; }
  .filter-btn[data-filter="생명과학"].active { background: var(--tag-bio); color: #000; }
  .filter-btn[data-filter="지구과학"].active { background: var(--tag-earth); color: #000; }
  .filter-btn[data-filter="정보"].active { background: var(--tag-info); color: #000; }
  .filter-btn[data-filter="기타"].active { background: var(--tag-etc); color: #000; }

  .stats-bar { padding: 10px 32px; font-size: 13px; color: var(--text-muted); }
  .stats-bar span { color: var(--text); font-weight: 600; }

  main { padding: 24px 32px 60px; max-width: 1440px; margin: 0 auto; }

  .series-section { margin-bottom: 48px; }
  .series-header {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 18px; padding-bottom: 14px; border-bottom: 1px solid var(--border);
  }
  .series-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .series-title { font-size: 19px; font-weight: 700; letter-spacing: -0.3px; }
  .series-link {
    font-size: 12px; color: var(--text-muted); text-decoration: none;
    display: flex; align-items: center; gap: 4px; transition: color 0.2s;
  }
  .series-link:hover { color: var(--accent); }
  .series-count {
    font-size: 12px; color: var(--text-muted);
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 12px; padding: 2px 10px; margin-left: auto;
  }

  .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(270px, 1fr)); gap: 14px; }

  .video-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
    padding: 16px; display: flex; flex-direction: column; gap: 8px;
    transition: border-color 0.15s, transform 0.15s;
  }
  .video-card.has-link { cursor: pointer; }
  .video-card.has-link:hover { border-color: var(--accent); transform: translateY(-2px); }
  .video-card:not(.has-link):hover { border-color: #484f58; }

  .card-top { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
  .card-num { font-size: 11px; color: var(--text-muted); font-weight: 500; }
  .card-tag {
    display: inline-block; border-radius: 4px; padding: 2px 8px;
    font-size: 11px; font-weight: 600; letter-spacing: 0.2px;
  }
  .tag-수학 { background: rgba(247,129,102,0.15); color: var(--tag-math); }
  .tag-물리 { background: rgba(121,192,255,0.15); color: var(--tag-physics); }
  .tag-화학 { background: rgba(255,166,87,0.15); color: var(--tag-chem); }
  .tag-생명과학 { background: rgba(124,227,139,0.15); color: var(--tag-bio); }
  .tag-지구과학 { background: rgba(86,211,100,0.15); color: var(--tag-earth); }
  .tag-정보 { background: rgba(210,168,255,0.15); color: var(--tag-info); }
  .tag-기타 { background: rgba(227,179,65,0.15); color: var(--tag-etc); }

  .card-title { font-size: 14px; font-weight: 600; line-height: 1.5; }
  .card-presenter { font-size: 12px; color: var(--text-muted); line-height: 1.4; }
  .card-date { font-size: 11px; color: #484f58; }
  .card-footer { margin-top: 2px; }
  .btn-watch {
    background: var(--accent); color: white; border: none; border-radius: 6px;
    padding: 6px 12px; font-size: 12px; font-weight: 600; cursor: pointer;
    font-family: inherit; text-decoration: none; display: inline-flex;
    align-items: center; gap: 4px; transition: opacity 0.2s;
  }
  .btn-watch:hover { opacity: 0.85; }
  .btn-playlist {
    background: transparent; color: var(--text-muted); border: 1px solid var(--border);
    border-radius: 6px; padding: 5px 11px; font-size: 12px; font-weight: 500; cursor: pointer;
    font-family: inherit; text-decoration: none; display: inline-flex;
    align-items: center; gap: 4px; transition: all 0.2s;
  }
  .btn-playlist:hover { border-color: #484f58; color: var(--text); }
  .no-link-badge { font-size: 11px; color: #484f58; }

  .video-card.hidden { display: none; }
  .video-card.custom { border-style: dashed; }
  .btn-delete {
    margin-left: auto; background: none; border: none; color: #484f58;
    cursor: pointer; font-size: 14px; padding: 2px 4px; line-height: 1;
    transition: color 0.2s;
  }
  .btn-delete:hover { color: #f85149; }

  /* FAB */
  .fab {
    position: fixed; bottom: 32px; right: 32px; z-index: 200;
    width: 52px; height: 52px; border-radius: 50%;
    background: var(--accent); color: white; border: none;
    font-size: 26px; cursor: pointer; box-shadow: 0 4px 20px rgba(255,60,60,0.4);
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .fab:hover { transform: scale(1.1); box-shadow: 0 6px 28px rgba(255,60,60,0.55); }

  /* Modal */
  .modal-overlay {
    display: none; position: fixed; inset: 0; z-index: 300;
    background: rgba(0,0,0,0.7); backdrop-filter: blur(4px);
    align-items: center; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface); border: 1px solid var(--border); border-radius: 14px;
    padding: 28px; width: 480px; max-width: calc(100vw - 32px);
    max-height: 90vh; overflow-y: auto;
    display: flex; flex-direction: column; gap: 16px;
  }
  .modal-title { font-size: 17px; font-weight: 700; }
  .modal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .modal-grid .full { grid-column: 1 / -1; }
  .field { display: flex; flex-direction: column; gap: 5px; }
  .field label { font-size: 12px; color: var(--text-muted); font-weight: 500; }
  .field input, .field select {
    background: var(--surface2); border: 1px solid var(--border); border-radius: 7px;
    padding: 8px 12px; color: var(--text); font-size: 14px; font-family: inherit;
    outline: none; transition: border-color 0.2s;
  }
  .field input:focus, .field select:focus { border-color: var(--accent); }
  .field select option { background: var(--surface2); }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 4px; }
  .btn-cancel {
    background: var(--surface2); border: 1px solid var(--border); border-radius: 7px;
    padding: 8px 18px; color: var(--text-muted); font-size: 14px;
    font-family: inherit; cursor: pointer; transition: all 0.2s;
  }
  .btn-cancel:hover { border-color: #484f58; color: var(--text); }
  .btn-save {
    background: var(--accent); border: none; border-radius: 7px;
    padding: 8px 20px; color: white; font-size: 14px; font-weight: 600;
    font-family: inherit; cursor: pointer; transition: opacity 0.2s;
  }
  .btn-save:hover { opacity: 0.85; }

  @media (max-width: 600px) {
    header, .filter-bar, .stats-bar, main { padding-left: 14px; padding-right: 14px; }
    .search-box { width: 100%; }
    .header-right { width: 100%; }
    .video-grid { grid-template-columns: 1fr; }
    .modal-grid { grid-template-columns: 1fr; }
    .fab { bottom: 20px; right: 20px; }
  }

  .video-card.custom { border-style: dashed; }
  .btn-delete {
    margin-left: auto; background: none; border: none; color: #484f58;
    cursor: pointer; font-size: 14px; padding: 2px 4px; line-height: 1;
    transition: color 0.2s;
  }
  .btn-delete:hover { color: #f85149; }
  .toast {
    position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
    background: #238636; color: white; border-radius: 8px;
    padding: 10px 20px; font-size: 14px; font-weight: 500;
    z-index: 500; opacity: 0; transition: opacity 0.3s; pointer-events: none;
  }
  .toast.show { opacity: 1; }
  .loading-overlay {
    position: fixed; inset: 0; z-index: 400;
    background: rgba(13,17,23,0.7); display: flex;
    align-items: center; justify-content: center;
    font-size: 15px; color: var(--text-muted);
  }
  .spinner {
    width: 32px; height: 32px; border: 3px solid var(--border);
    border-top-color: var(--accent); border-radius: 50%;
    animation: spin 0.7s linear infinite; margin-right: 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">🔬</div>
    <span class="logo-text">과학 동영상 포털</span>
  </div>
  <div class="header-right">
    <input type="text" class="search-box" id="searchInput" placeholder="제목, 강사명으로 검색...">
  </div>
</header>

<div class="filter-bar">
  <span class="filter-label">주제별 필터</span>
  <button class="filter-btn active" data-filter="all">전체</button>
  <button class="filter-btn" data-filter="수학">📐 수학</button>
  <button class="filter-btn" data-filter="물리">⚛️ 물리</button>
  <button class="filter-btn" data-filter="화학">🧪 화학</button>
  <button class="filter-btn" data-filter="생명과학">🧬 생명과학</button>
  <button class="filter-btn" data-filter="지구과학">🌍 지구과학</button>
  <button class="filter-btn" data-filter="정보">💻 정보</button>
  <button class="filter-btn" data-filter="기타">✨ 기타</button>
</div>

<div class="stats-bar">총 <span id="countVisible">0</span>개 동영상 표시 중</div>

<main>
  <section class="series-section">
    <div class="series-header">
      <div class="series-dot" style="background:var(--series-travel)"></div>
      <span class="series-title">취미는 과학 여행</span>

  <section class="series-section">

      <span class="series-count" id="count-science">0개</span>

  </section>
  <section class="series-section">
    <div class="series-header">
      <div class="series-dot" style="background:var(--series-kbs)"></div>

</main>

<button class="fab" onclick="openModal()" title="동영상 추가">＋</button>

<div class="modal-overlay" id="addModal" onclick="if(event.target===this)closeModal()">
  <div class="modal">

    <div class="modal-grid">
      <div class="field full">
        <label>제목 *</label>
        <input id="f-title" type="text" placeholder="동영상 제목">
      </div>
      <div class="field full">
        <label>강사 / 출연자</label>

      </div>
      <div class="field">
        <label>시리즈</label>
        <select id="f-series">

          <option value="science" selected>취미는 과학</option>
          <option value="kbs">KBS 사이언스 워</option>
        </select>
      </div>
      <div class="field">
        <label>주제</label>
        <select id="f-tag">
          <option value="수학">📐 수학</option>
          <option value="물리">⚛️ 물리</option>
          <option value="화학">🧪 화학</option>
          <option value="생명과학">🧬 생명과학</option>
          <option value="지구과학" selected>🌍 지구과학</option>
          <option value="정보">💻 정보</option>
          <option value="기타">✨ 기타</option>
        </select>
      </div>
      <div class="field">
        <label>방영일</label>
        <input id="f-date" type="text" placeholder="예) 26.4.3.">
      </div>
      <div class="field full">
        <label>YouTube 링크 (없으면 비워두세요)</label>
        <input id="f-url" type="url" placeholder="https://www.youtube.com/...">
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">취소</button>
      <button class="btn-save" onclick="saveNew()">추가하기</button>
    </div>
  </div>
</div>

<div class="loading-overlay" id="loadingOverlay" style="display:none">
  <div class="spinner"></div><span style="margin-left:8px">처리 중...</span>
</div>
<div class="toast" id="toast"></div>

// ── 카드 렌더링 ───────────────────────────────────────────────
function makeCard(v, usePlaylist) {
  const linked = !!v.url || usePlaylist;
  const href = v.url || (usePlaylist ? PL_URL : null);
  const div = document.createElement('div');
  div.className = 'video-card' + (linked ? ' has-link' : '');
  div.dataset.tag = v.tag;
  div.dataset.search = (v.title + ' ' + (v.presenter || '')).toLowerCase();
  if (linked) div.onclick = () => window.open(href, '_blank');
  let btn = v.url
    ? `<a class="btn-watch" href="${v.url}" target="_blank" onclick="event.stopPropagation()">▶ 시청하기</a>`
    : usePlaylist
      ? `<a class="btn-playlist" href="${PL_URL}" target="_blank" onclick="event.stopPropagation()">▶ 플레이리스트에서 보기</a>`
      : `<span class="no-link-badge">링크 없음</span>`;
  div.innerHTML =
    `<div class="card-top">
      <span class="card-num">#${String(v.num).padStart(2,'0')}</span>
      <span class="card-tag tag-${v.tag}">${v.tag}</span>
    </div>
    <div class="card-title">${v.title}</div>
    ${v.presenter ? `<div class="card-presenter">${v.presenter}</div>` : ''}
    ${v.date ? `<div class="card-date">${v.date}</div>` : ''}
    <div class="card-footer">${btn}</div>`;
  return div;
}

function makeCustomCard(v) {
  const linked = !!v.url;
  const div = document.createElement('div');
  div.className = 'video-card custom' + (linked ? ' has-link' : '');
  div.dataset.tag = v.tag;
  div.dataset.search = (v.title + ' ' + (v.presenter || '')).toLowerCase();
  if (linked) div.onclick = (e) => { if (!e.target.closest('.btn-delete')) window.open(v.url, '_blank'); };
  const btn = linked
    ? `<a class="btn-watch" href="${v.url}" target="_blank" onclick="event.stopPropagation()">▶ 시청하기</a>`
    : `<span class="no-link-badge">링크 없음</span>`;
  div.innerHTML =
    `<div class="card-top">
      <span class="card-num">추가</span>
      <span class="card-tag tag-${v.tag}">${v.tag}</span>
      <button class="btn-delete" onclick="deleteCustom('${v.id}',event)">✕</button>
    </div>
    <div class="card-title">${v.title}</div>
    ${v.presenter ? `<div class="card-presenter">${v.presenter}</div>` : ''}
    ${v.date ? `<div class="card-date">${v.date}</div>` : ''}
    <div class="card-footer">${btn}</div>`;
  return div;
}

// ── 필터 & 검색 ───────────────────────────────────────────────
let activeFilter = 'all', searchQ = '';

function applyFilters() {
  let total = 0;
  document.querySelectorAll('.video-card').forEach(c => {
    const show = (activeFilter === 'all' || c.dataset.tag === activeFilter)
              && (!searchQ || c.dataset.search.includes(searchQ));
    c.classList.toggle('hidden', !show);
    if (show) total++;
  });
  document.getElementById('countVisible').textContent = total;
  ['travel','science','kbs'].forEach(id => {
    const g = document.getElementById('grid-' + id);
    const n = g.querySelectorAll('.video-card:not(.hidden)').length;
    document.getElementById('count-' + id).textContent = n + '개';
    g.closest('.series-section').style.display = n === 0 ? 'none' : '';
  });
}

document.querySelectorAll('.filter-btn').forEach(b => {
  b.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    activeFilter = b.dataset.filter;
    applyFilters();
  });
});
document.getElementById('searchInput').addEventListener('input', e => {
  searchQ = e.target.value.toLowerCase();
  applyFilters();
});

// ── 초기 렌더링 ───────────────────────────────────────────────
function renderAll() {
  TRAVEL.forEach(v => document.getElementById('grid-travel').appendChild(makeCard(v, false)));
  SCIENCE.forEach(v => document.getElementById('grid-science').appendChild(makeCard(v, true)));
  KBS.forEach(v => document.getElementById('grid-kbs').appendChild(makeCard(v, false)));
  applyFilters();
}

function renderCustom(videos) {
  document.querySelectorAll('.video-card.custom').forEach(c => c.remove());
  const gridMap = { travel:'grid-travel', science:'grid-science', kbs:'grid-kbs' };
  (videos || []).forEach(v => {
    const grid = document.getElementById(gridMap[v.series] || 'grid-science');
    if (grid) grid.appendChild(makeCustomCard(v));
  });
  applyFilters();
}

// ── GAS fetch 통신 ────────────────────────────────────────────
async function loadCustomFromServer() {
  try {
    const res = await fetch(GAS_URL + '?action=list');
    const videos = await res.json();
    renderCustom(videos);
  } catch(e) {
    console.error('불러오기 실패:', e);
  }
}

async function deleteCustom(id, e) {
  e.stopPropagation();
  if (!confirm('이 항목을 삭제할까요?')) return;
  showLoading();
  try {
    await fetch(GAS_URL, {
      method: 'POST',
      body: JSON.stringify({ action: 'delete', id }),
    });
    hideLoading(); showToast('삭제됐어요!');
    loadCustomFromServer();
  } catch(err) {
    hideLoading(); alert('삭제 실패: ' + err.message);
  }
}

function openModal() { document.getElementById('addModal').classList.add('open'); }
function closeModal() { document.getElementById('addModal').classList.remove('open'); }
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

async function saveNew() {
  const title = document.getElementById('f-title').value.trim();
  if (!title) { alert('제목을 입력해주세요.'); return; }
  const data = {
    series:    document.getElementById('f-series').value,
    title,
    presenter: document.getElementById('f-presenter').value.trim(),
    tag:       document.getElementById('f-tag').value,
    date:      document.getElementById('f-date').value.trim(),
    url:       document.getElementById('f-url').value.trim() || null,
  };
  closeModal(); showLoading();
  try {
    await fetch(GAS_URL, {
      method: 'POST',
      body: JSON.stringify({ action: 'add', data }),
    });
    hideLoading(); showToast('추가됐어요! 🎉');
    ['f-title','f-presenter','f-date','f-url'].forEach(id => document.getElementById(id).value = '');
    loadCustomFromServer();
  } catch(err) {
    hideLoading(); alert('저장 실패: ' + err.message);
  }
}

function showLoading() { document.getElementById('loadingOverlay').style.display = 'flex'; }
function hideLoading() { document.getElementById('loadingOverlay').style.display = 'none'; }
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

renderAll();
loadCustomFromServer();
</script>
</body>
</html>
